<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدفع - نظام فواتير الإنترنت</title>
    <link rel="stylesheet" href="/css/tailwind.css">
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="dashboard.html" class="text-xl font-bold text-blue-600">Broadband Portal</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="dashboard.html" class="text-sm text-gray-700 hover:text-blue-600">لوحة التحكم</a>
                    <button onclick="auth.logout()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors text-sm">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-900">Make Payment</h2>
            <p class="text-gray-600 mt-2">Pay your invoice securely</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2">
                <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">Payment Method</h3>
                    
                    <div class="flex space-x-2 mb-6">
                        <button onclick="selectPaymentMethod('mada')" id="btn-mada" class="flex-1 px-4 py-3 border-2 border-blue-600 bg-blue-50 text-blue-600 rounded-lg font-medium transition-colors">
                            Mada
                        </button>
                        <button onclick="selectPaymentMethod('visa')" id="btn-visa" class="flex-1 px-4 py-3 border-2 border-gray-300 bg-white text-gray-700 rounded-lg font-medium hover:border-gray-400 transition-colors">
                            Visa
                        </button>
                        <button onclick="selectPaymentMethod('mastercard')" id="btn-mastercard" class="flex-1 px-4 py-3 border-2 border-gray-300 bg-white text-gray-700 rounded-lg font-medium hover:border-gray-400 transition-colors">
                            MasterCard
                        </button>
                    </div>

                    <form id="payment-form" class="space-y-6">
                        <div>
                            <label for="amount" class="block text-sm font-medium text-gray-700 mb-2">
                                Amount (SAR) <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="number" 
                                id="amount" 
                                name="amount" 
                                required
                                min="0"
                                step="0.01"
                                placeholder="0.00"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <p class="error-message text-red-500 text-sm mt-1 hidden"></p>
                        </div>

                        <div>
                            <label for="card-number" class="block text-sm font-medium text-gray-700 mb-2">
                                Card Number <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="text" 
                                id="card-number" 
                                name="card-number" 
                                required
                                maxlength="19"
                                placeholder="1234 5678 9012 3456"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <p class="error-message text-red-500 text-sm mt-1 hidden"></p>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label for="expiry" class="block text-sm font-medium text-gray-700 mb-2">
                                    Expiry Date <span class="text-red-500">*</span>
                                </label>
                                <input 
                                    type="text" 
                                    id="expiry" 
                                    name="expiry" 
                                    required
                                    maxlength="5"
                                    placeholder="MM/YY"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                <p class="error-message text-red-500 text-sm mt-1 hidden"></p>
                            </div>

                            <div>
                                <label for="cvv" class="block text-sm font-medium text-gray-700 mb-2">
                                    CVV <span class="text-red-500">*</span>
                                </label>
                                <input 
                                    type="text" 
                                    id="cvv" 
                                    name="cvv" 
                                    required
                                    maxlength="4"
                                    placeholder="123"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                <p class="error-message text-red-500 text-sm mt-1 hidden"></p>
                            </div>
                        </div>

                        <div>
                            <label for="cardholder-name" class="block text-sm font-medium text-gray-700 mb-2">
                                Cardholder Name <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="text" 
                                id="cardholder-name" 
                                name="cardholder-name" 
                                required
                                placeholder="Name on card"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <p class="error-message text-red-500 text-sm mt-1 hidden"></p>
                        </div>

                        <button 
                            type="submit" 
                            class="w-full px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-medium">
                            Pay Now
                        </button>
                    </form>
                </div>
            </div>

            <div>
                <div class="bg-blue-50 border border-blue-200 rounded-lg p-6 mb-6">
                    <h3 class="text-lg font-semibold text-blue-900 mb-4">Payment Summary</h3>
                    <div class="space-y-2">
                        <div class="flex justify-between text-sm">
                            <span class="text-blue-700">المبلغ</span>
                            <span id="summary-amount" class="font-medium text-blue-900">SAR 0.00</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-blue-700">Processing Fee</span>
                            <span class="font-medium text-blue-900">SAR 0.00</span>
                        </div>
                        <div class="border-t border-blue-300 pt-2 mt-2">
                            <div class="flex justify-between">
                                <span class="font-semibold text-blue-900">الإجمالي</span>
                                <span id="summary-total" class="font-bold text-blue-900">SAR 0.00</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-gray-50 border border-gray-200 rounded-lg p-4">
                    <div class="flex">
                        <svg class="h-5 w-5 text-gray-600 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                        <div>
                            <p class="text-sm font-medium text-gray-900">Secure Payment</p>
                            <p class="text-xs text-gray-600 mt-1">Your payment information is encrypted and secure.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6 mt-8">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">Transaction History</h3>
            <div id="transactions-table"></div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    <script>
        if (!auth.requireAuth()) {
            throw new Error('Authentication required');
        }

        let selectedMethod = 'mada';

        const invoiceId = utils.getQueryParam('invoiceId');
        if (invoiceId) {
            loadInvoiceAmount(invoiceId);
        }

        function selectPaymentMethod(method) {
            selectedMethod = method;
            
            document.getElementById('btn-mada').className = 'flex-1 px-4 py-3 border-2 border-gray-300 bg-white text-gray-700 rounded-lg font-medium hover:border-gray-400 transition-colors';
            document.getElementById('btn-visa').className = 'flex-1 px-4 py-3 border-2 border-gray-300 bg-white text-gray-700 rounded-lg font-medium hover:border-gray-400 transition-colors';
            document.getElementById('btn-mastercard').className = 'flex-1 px-4 py-3 border-2 border-gray-300 bg-white text-gray-700 rounded-lg font-medium hover:border-gray-400 transition-colors';
            
            document.getElementById(`btn-${method}`).className = 'flex-1 px-4 py-3 border-2 border-blue-600 bg-blue-50 text-blue-600 rounded-lg font-medium transition-colors';
        }

        document.getElementById('amount').addEventListener('input', (e) => {
            const amount = parseFloat(e.target.value) || 0;
            document.getElementById('summary-amount').textContent = utils.formatCurrency(amount);
            document.getElementById('summary-total').textContent = utils.formatCurrency(amount);
        });

        document.getElementById('card-number').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\s/g, '');
            let formatted = value.match(/.{1,4}/g)?.join(' ') || value;
            e.target.value = formatted;
        });

        document.getElementById('expiry').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length >= 2) {
                value = value.slice(0, 2) + '/' + value.slice(2, 4);
            }
            e.target.value = value;
        });

        document.getElementById('cvv').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
        });

        async function loadInvoiceAmount(invoiceId) {
            try {
                const response = await api.get(`/invoices/${invoiceId}`);
                if (response && response.data) {
                    document.getElementById('amount').value = response.data.totalAmount || 0;
                    document.getElementById('amount').dispatchEvent(new Event('input'));
                }
            } catch (error) {
                console.error('Error loading invoice:', error);
            }
        }

        document.getElementById('payment-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const amount = parseFloat(document.getElementById('amount').value);
            const cardNumber = document.getElementById('card-number').value.replace(/\s/g, '');
            const expiry = document.getElementById('expiry').value;
            const cvv = document.getElementById('cvv').value;
            const cardholderName = document.getElementById('cardholder-name').value;

            if (!amount || amount <= 0) {
                utils.showToast('Please enter a valid amount', 'error');
                return;
            }

            if (cardNumber.length < 15 || cardNumber.length > 16) {
                utils.showToast('Please enter a valid card number', 'error');
                return;
            }

            if (!/^\d{2}\/\d{2}$/.test(expiry)) {
                utils.showToast('Please enter a valid expiry date (MM/YY)', 'error');
                return;
            }

            if (cvv.length < 3 || cvv.length > 4) {
                utils.showToast('Please enter a valid CVV', 'error');
                return;
            }

            if (!cardholderName.trim()) {
                utils.showToast('Please enter cardholder name', 'error');
                return;
            }

            try {
                utils.showLoading();

                const paymentData = {
                    amount: amount,
                    paymentMethod: selectedMethod,
                    cardLast4: cardNumber.slice(-4),
                    invoiceId: invoiceId || null
                };

                const response = await api.post('/payments/initiate', paymentData);

                if (response && response.data) {
                    utils.showToast('Payment processed successfully!', 'success');
                    
                    setTimeout(() => {
                        if (invoiceId) {
                            window.location.href = 'invoices.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    }, 2000);
                }
            } catch (error) {
                console.error('Error processing payment:', error);
                utils.showToast('Payment failed. Please try again.', 'error');
            } finally {
                utils.hideLoading();
            }
        });

        async function loadTransactions() {
            try {
                const response = await api.get('/payments?pageSize=10');
                
                if (response && response.data) {
                    const transactions = response.data.items || response.data;
                    
                    const columns = [
                        { label: 'Date', field: 'paymentDate', type: 'datetime' },
                        { label: 'Amount', field: 'amount', type: 'currency' },
                        { label: 'Method', field: 'paymentMethod' },
                        { label: 'Transaction ID', field: 'transactionId' },
                        { 
                            label: 'Status', 
                            field: 'status',
                            render: (row) => {
                                const colors = {
                                    'Completed': 'bg-green-100 text-green-800',
                                    'Pending': 'bg-yellow-100 text-yellow-800',
                                    'Failed': 'bg-red-100 text-red-800'
                                };
                                const colorClass = colors[row.status] || 'bg-gray-100 text-gray-800';
                                return `<span class="px-2 py-1 text-xs font-semibold rounded-full ${colorClass}">${row.status}</span>`;
                            }
                        }
                    ];
                    
                    components.renderTable(transactions, columns, 'transactions-table');
                }
            } catch (error) {
                console.error('Error loading transactions:', error);
            }
        }

        loadTransactions();
    </script>
</body>
</html>
