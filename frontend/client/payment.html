<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدفع - نظام فواتير الإنترنت</title>
    <link rel="stylesheet" href="/css/tailwind.css">
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="dashboard.html" class="text-xl font-bold text-blue-600">بوابة الإنترنت</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="dashboard.html" class="text-sm text-gray-700 hover:text-blue-600">لوحة التحكم</a>
                    <button onclick="auth.logout()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors text-sm">
                        تسجيل الخروج
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-900">إجراء دفعة</h2>
            <p class="text-gray-600 mt-2">ادفع فاتورتك بشكل آمن</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2">
                <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">طريقة الدفع</h3>
                    
                    <div class="flex space-x-2 mb-6">
                        <button onclick="selectPaymentMethod('mada')" id="btn-mada" class="flex-1 px-4 py-3 border-2 border-blue-600 bg-blue-50 text-blue-600 rounded-lg font-medium transition-colors">
                            Mada
                        </button>
                        <button onclick="selectPaymentMethod('visa')" id="btn-visa" class="flex-1 px-4 py-3 border-2 border-gray-300 bg-white text-gray-700 rounded-lg font-medium hover:border-gray-400 transition-colors">
                            Visa
                        </button>
                        <button onclick="selectPaymentMethod('mastercard')" id="btn-mastercard" class="flex-1 px-4 py-3 border-2 border-gray-300 bg-white text-gray-700 rounded-lg font-medium hover:border-gray-400 transition-colors">
                            MasterCard
                        </button>
                    </div>

                    <form id="payment-form" class="space-y-6">
                        <div>
                            <label for="amount" class="block text-sm font-medium text-gray-700 mb-2">
                                المبلغ (ر.س) <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="number" 
                                id="amount" 
                                name="amount" 
                                required
                                min="0"
                                step="0.01"
                                placeholder="0.00"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <p class="error-message text-red-500 text-sm mt-1 hidden"></p>
                        </div>

                        <div>
                            <label for="card-number" class="block text-sm font-medium text-gray-700 mb-2">
                                رقم البطاقة <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="text" 
                                id="card-number" 
                                name="card-number" 
                                required
                                maxlength="19"
                                placeholder="1234 5678 9012 3456"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <p class="error-message text-red-500 text-sm mt-1 hidden"></p>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label for="expiry" class="block text-sm font-medium text-gray-700 mb-2">
                                    تاريخ الانتهاء <span class="text-red-500">*</span>
                                </label>
                                <input 
                                    type="text" 
                                    id="expiry" 
                                    name="expiry" 
                                    required
                                    maxlength="5"
                                    placeholder="MM/YY"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                <p class="error-message text-red-500 text-sm mt-1 hidden"></p>
                            </div>

                            <div>
                                <label for="cvv" class="block text-sm font-medium text-gray-700 mb-2">
                                    CVV <span class="text-red-500">*</span>
                                </label>
                                <input 
                                    type="text" 
                                    id="cvv" 
                                    name="cvv" 
                                    required
                                    maxlength="4"
                                    placeholder="123"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                <p class="error-message text-red-500 text-sm mt-1 hidden"></p>
                            </div>
                        </div>

                        <div>
                            <label for="cardholder-name" class="block text-sm font-medium text-gray-700 mb-2">
                                اسم حامل البطاقة <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="text" 
                                id="cardholder-name" 
                                name="cardholder-name" 
                                required
                                placeholder="الاسم على البطاقة"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <p class="error-message text-red-500 text-sm mt-1 hidden"></p>
                        </div>

                        <button 
                            type="submit" 
                            class="w-full px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-medium">
                            ادفع الآن
                        </button>
                    </form>
                </div>
            </div>

            <div>
                <div class="bg-blue-50 border border-blue-200 rounded-lg p-6 mb-6">
                    <h3 class="text-lg font-semibold text-blue-900 mb-4">ملخص الدفع</h3>
                    <div class="space-y-2">
                        <div class="flex justify-between text-sm">
                            <span class="text-blue-700">المبلغ</span>
                            <span id="summary-amount" class="font-medium text-blue-900">SAR 0.00</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-blue-700">رسوم المعالجة</span>
                            <span class="font-medium text-blue-900">SAR 0.00</span>
                        </div>
                        <div class="border-t border-blue-300 pt-2 mt-2">
                            <div class="flex justify-between">
                                <span class="font-semibold text-blue-900">الإجمالي</span>
                                <span id="summary-total" class="font-bold text-blue-900">SAR 0.00</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-gray-50 border border-gray-200 rounded-lg p-4">
                    <div class="flex">
                        <svg class="h-5 w-5 text-gray-600 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                        <div>
                            <p class="text-sm font-medium text-gray-900">دفع آمن</p>
                            <p class="text-xs text-gray-600 mt-1">معلومات الدفع الخاصة بك مشفرة وآمنة.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6 mt-8">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">سجل المعاملات</h3>
            <div id="transactions-table"></div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/pages/client/payment.js"></script>
</body>
</html>
