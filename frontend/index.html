<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام فواتير الإنترنت</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-500 via-blue-600 to-indigo-700">
    <div class="min-h-screen flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full">
            <div class="bg-white rounded-2xl shadow-2xl p-8">
                <div class="text-center mb-8">
                    <div class="mx-auto h-16 w-16 bg-blue-600 rounded-full flex items-center justify-center mb-4">
                        <svg class="h-10 w-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                    <h2 class="text-3xl font-bold text-gray-900">مرحباً بعودتك</h2>
                    <p class="text-gray-600 mt-2">تسجيل الدخول إلى حسابك</p>
                </div>

                <form id="login-form" class="space-y-6">
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                            اسم المستخدم أو البريد الإلكتروني
                        </label>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            required
                            autocomplete="username"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
                            placeholder="أدخل اسم المستخدم">
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                            كلمة المرور
                        </label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            required
                            autocomplete="current-password"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
                            placeholder="أدخل كلمة المرور">
                    </div>

                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input 
                                type="checkbox" 
                                id="remember" 
                                name="remember"
                                class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                            <label for="remember" class="ml-2 block text-sm text-gray-700">
                                تذكرني
                            </label>
                        </div>
                        <a href="#" class="text-sm font-medium text-blue-600 hover:text-blue-500">
                            نسيت كلمة المرور؟
                        </a>
                    </div>

                    <button 
                        type="submit" 
                        class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg font-medium hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors">
                        تسجيل الدخول
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-sm text-gray-600">
                        ليس لديك حساب؟ 
                        <a href="#" class="font-medium text-blue-600 hover:text-blue-500">اتصل بالمسؤول</a>
                    </p>
                </div>
            </div>

            <div class="text-center mt-6">
                <p class="text-white text-sm">
                    &copy; 2026 نظام فواتير الإنترنت. جميع الحقوق محفوظة.
                </p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script>
        if (auth.isAuthenticated()) {
            const user = auth.getUser();
            if (user && user.userType === 'Admin') {
                window.location.href = '/admin/dashboard.html';
            } else {
                window.location.href = '/client/dashboard.html';
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('remember').checked;

            if (!username || !password) {
                utils.showToast('الرجاء إدخال اسم المستخدم وكلمة المرور', 'error');
                return;
            }

            try {
                utils.showLoading();
                
                // Try to login - backend will determine user type
                const success = await auth.login(username, password, rememberMe);
                
                if (success) {
                    utils.showToast('تم تسجيل الدخول بنجاح! جاري التحويل...', 'success');
                    
                    setTimeout(() => {
                        const user = auth.getUser();
                        if (user && user.userType === 'Admin') {
                            window.location.href = '/admin/dashboard.html';
                        } else {
                            window.location.href = '/client/dashboard.html';
                        }
                    }, 1000);
                }
            } catch (error) {
                utils.showToast(error.message || 'فشل تسجيل الدخول. الرجاء التحقق من بيانات الاعتماد.', 'error');
            } finally {
                utils.hideLoading();
            }
        });

        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('login-form').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
