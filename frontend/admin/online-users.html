<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المستخدمون المتصلون - نظام فواتير الإنترنت</title>
    <link rel="stylesheet" href="/css/tailwind.css">
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-gradient-to-b from-blue-900 to-blue-800 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
            <div class="flex items-center justify-between h-16 px-6 bg-blue-950">
                <h1 class="text-xl font-bold text-white">إدارة النظام</h1>
                <button id="close-sidebar" class="lg:hidden text-white hover:text-gray-300">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <nav class="mt-6 px-3">
                <a href="dashboard.html" class="flex items-center px-4 py-3 mb-2 text-blue-100 hover:bg-blue-700 rounded-lg transition-colors">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    Dashboard
                </a>
                
                <a href="subscribers.html" class="flex items-center px-4 py-3 mb-2 text-blue-100 hover:bg-blue-700 rounded-lg transition-colors">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                    Subscribers
                </a>
                
                <a href="plans.html" class="flex items-center px-4 py-3 mb-2 text-blue-100 hover:bg-blue-700 rounded-lg transition-colors">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                    </svg>
                    Plans
                </a>
                
                <a href="invoices.html" class="flex items-center px-4 py-3 mb-2 text-blue-100 hover:bg-blue-700 rounded-lg transition-colors">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    Invoices
                </a>
                
                <a href="payments.html" class="flex items-center px-4 py-3 mb-2 text-blue-100 hover:bg-blue-700 rounded-lg transition-colors">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path>
                    </svg>
                    Payments
                </a>
                
                <a href="reports.html" class="flex items-center px-4 py-3 mb-2 text-blue-100 hover:bg-blue-700 rounded-lg transition-colors">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                    Reports
                </a>
                
                <a href="online-users.html" class="flex items-center px-4 py-3 mb-2 text-white bg-blue-700 rounded-lg">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.636 18.364a9 9 0 010-12.728m12.728 0a9 9 0 010 12.728m-9.9-2.829a5 5 0 010-7.07m7.072 0a5 5 0 010 7.07M13 12a1 1 0 11-2 0 1 1 0 012 0z"></path>
                    </svg>
                    Online Users
                </a>
            </nav>
        </aside>

        <div class="flex-1 lg:ml-64">
            <header class="bg-white shadow-sm">
                <div class="flex items-center justify-between px-6 py-4">
                    <div class="flex items-center">
                        <button id="menu-toggle" class="lg:hidden mr-4 text-gray-600 hover:text-gray-900">
                            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                            </svg>
                        </button>
                        <h2 class="text-2xl font-semibold text-gray-800">المستخدمون المتصلون</h2>
                    </div>
                    
                    <div class="flex items-center space-x-4">
                        <div class="hidden md:flex items-center text-gray-700">
                            <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                            <span id="user-name" class="font-medium">Admin User</span>
                        </div>
                        <button onclick="auth.logout()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">
                            Logout
                        </button>
                    </div>
                </div>
            </header>

            <main class="p-6">
                <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-4">
                            <div class="flex items-center">
                                <span class="h-3 w-3 bg-green-500 rounded-full animate-pulse mr-2"></span>
                                <span class="text-sm text-gray-600">Live monitoring - Auto-refresh every 30 seconds</span>
                            </div>
                            <div class="text-sm text-gray-600">
                                Last updated: <span id="last-update" class="font-medium">-</span>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <span class="text-sm font-medium text-gray-700">Total Online:</span>
                            <span id="online-count" class="text-2xl font-bold text-green-600">0</span>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow-md p-6">
                    <div id="online-users-table"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    <script>
        if (!auth.requireAuth()) {
            throw new Error('Authentication required');
        }

        const user = auth.getUser();
        if (user && user.fullName) {
            document.getElementById('user-name').textContent = user.fullName;
        }

        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const closeSidebar = document.getElementById('close-sidebar');

        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('-translate-x-full');
        });

        closeSidebar.addEventListener('click', () => {
            sidebar.classList.add('-translate-x-full');
        });

        let refreshInterval;

        async function fetchOnlineUsers() {
            try {
                const response = await api.get('/mikrotik/online-users');
                
                if (response && response.data) {
                    const onlineUsers = response.data;
                    
                    document.getElementById('online-count').textContent = onlineUsers.length;
                    document.getElementById('last-update').textContent = utils.formatDateTime(new Date().toISOString());
                    
                    const columns = [
                        { label: 'Username', field: 'username' },
                        { 
                            label: 'IP Address', 
                            field: 'ipAddress',
                            render: (row) => row.ipAddress || row.ip || '-'
                        },
                        { 
                            label: 'Session Duration', 
                            field: 'sessionDuration',
                            render: (row) => {
                                const seconds = row.sessionDuration || row.uptime || 0;
                                const hours = Math.floor(seconds / 3600);
                                const minutes = Math.floor((seconds % 3600) / 60);
                                return `${hours}h ${minutes}m`;
                            }
                        },
                        { 
                            label: 'Download Speed', 
                            field: 'downloadSpeed',
                            render: (row) => {
                                const speed = row.downloadSpeed || row.rxRate || 0;
                                return `${(speed / 1000000).toFixed(2)} Mbps`;
                            }
                        },
                        { 
                            label: 'Upload Speed', 
                            field: 'uploadSpeed',
                            render: (row) => {
                                const speed = row.uploadSpeed || row.txRate || 0;
                                return `${(speed / 1000000).toFixed(2)} Mbps`;
                            }
                        },
                        { 
                            label: 'Data Used', 
                            field: 'dataUsed',
                            render: (row) => {
                                const bytes = (row.dataUsed || row.rxBytes || 0) + (row.txBytes || 0);
                                return utils.formatBytes(bytes);
                            }
                        },
                        { 
                            label: 'Status', 
                            field: 'status',
                            render: (row) => {
                                return `<span class="px-2 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-800">
                                    <span class="inline-block h-2 w-2 bg-green-600 rounded-full mr-1"></span>
                                    Online
                                </span>`;
                            }
                        },
                        { 
                            label: 'Actions', 
                            field: 'username',
                            render: (row) => `
                                <button onclick="disconnectUser('${row.username || row.id}')" class="px-3 py-1 bg-red-600 text-white text-sm rounded hover:bg-red-700 transition-colors">
                                    Disconnect
                                </button>
                            `
                        }
                    ];
                    
                    components.renderTable(onlineUsers, columns, 'online-users-table');
                }
            } catch (error) {
                console.error('Error fetching online users:', error);
                document.getElementById('online-count').textContent = '0';
                document.getElementById('last-update').textContent = utils.formatDateTime(new Date().toISOString());
                
                document.getElementById('online-users-table').innerHTML = `
                    <div class="text-center py-12 text-gray-500">
                        <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414"></path>
                        </svg>
                        <p class="mt-2">No online users or unable to connect to MikroTik</p>
                    </div>
                `;
            }
        }

        window.disconnectUser = async function(username) {
            if (!confirm(`Are you sure you want to disconnect user "${username}"?`)) {
                return;
            }
            
            try {
                utils.showLoading();
                await api.post(`/mikrotik/disconnect/${username}`, {});
                utils.showToast(`User ${username} disconnected successfully`, 'success');
                
                setTimeout(() => {
                    fetchOnlineUsers();
                }, 1000);
            } catch (error) {
                console.error('Error disconnecting user:', error);
                utils.showToast('Failed to disconnect user', 'error');
            } finally {
                utils.hideLoading();
            }
        };

        function startAutoRefresh() {
            refreshInterval = setInterval(() => {
                fetchOnlineUsers();
            }, 30000);
        }

        function stopAutoRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        }

        window.addEventListener('beforeunload', () => {
            stopAutoRefresh();
        });

        fetchOnlineUsers();
        startAutoRefresh();
    </script>
</body>
</html>
