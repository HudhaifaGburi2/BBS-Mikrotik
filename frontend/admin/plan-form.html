<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نموذج الباقة - نظام فواتير الإنترنت</title>
    <link rel="stylesheet" href="/css/tailwind.css">
</head>
<body class="bg-gray-100">
    <div class="min-h-screen py-8 px-4">
        <div class="max-w-3xl mx-auto">
            <div class="bg-white rounded-lg shadow-md p-8">
                <div class="flex items-center justify-between mb-6">
                    <h2 id="form-title" class="text-2xl font-bold text-gray-900">إضافة باقة</h2>
                    <a href="plans.html" class="text-gray-600 hover:text-gray-900">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </a>
                </div>

                <form id="plan-form" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="md:col-span-2">
                            <label for="name" class="block text-sm font-medium text-gray-700 mb-2">
                                اسم الباقة <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="text" 
                                id="name" 
                                name="name" 
                                required
                                placeholder="مثال: باقة 100 ميغا"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <p class="error-message text-red-500 text-sm mt-1 hidden"></p>
                        </div>

                        <div class="md:col-span-2">
                            <label for="description" class="block text-sm font-medium text-gray-700 mb-2">
                                الوصف
                            </label>
                            <textarea 
                                id="description" 
                                name="description" 
                                rows="3"
                                placeholder="وصف الباقة والمميزات..."
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
                        </div>

                        <div>
                            <label for="downloadSpeedMbps" class="block text-sm font-medium text-gray-700 mb-2">
                                سرعة التحميل (ميغابت/ث) <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="number" 
                                id="downloadSpeedMbps" 
                                name="downloadSpeedMbps" 
                                required
                                min="1"
                                placeholder="100"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <p class="error-message text-red-500 text-sm mt-1 hidden"></p>
                        </div>

                        <div>
                            <label for="uploadSpeedMbps" class="block text-sm font-medium text-gray-700 mb-2">
                                سرعة الرفع (ميغابت/ث) <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="number" 
                                id="uploadSpeedMbps" 
                                name="uploadSpeedMbps" 
                                required
                                min="1"
                                placeholder="50"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <p class="error-message text-red-500 text-sm mt-1 hidden"></p>
                        </div>

                        <div>
                            <label for="price" class="block text-sm font-medium text-gray-700 mb-2">
                                السعر (ر.س) <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="number" 
                                id="price" 
                                name="price" 
                                required
                                min="0"
                                step="0.01"
                                placeholder="299.00"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <p class="error-message text-red-500 text-sm mt-1 hidden"></p>
                        </div>

                        <div>
                            <label for="durationDays" class="block text-sm font-medium text-gray-700 mb-2">
                                دورة الفوترة (أيام) <span class="text-red-500">*</span>
                            </label>
                            <select 
                                id="durationDays" 
                                name="durationDays" 
                                required
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                <option value="30">شهري (30 يوم)</option>
                                <option value="90">ربع سنوي (90 يوم)</option>
                                <option value="180">نصف سنوي (180 يوم)</option>
                                <option value="365">سنوي (365 يوم)</option>
                            </select>
                        </div>

                        <div>
                            <label for="dataLimitGB" class="block text-sm font-medium text-gray-700 mb-2">
                                حد البيانات (جيجابايت) <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="number" 
                                id="dataLimitGB" 
                                name="dataLimitGB" 
                                required
                                min="0"
                                placeholder="0 لغير محدود"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <p class="text-xs text-gray-500 mt-1">اضبط 0 لبيانات غير محدودة</p>
                        </div>

                        <div>
                            <label for="mikrotikProfile" class="block text-sm font-medium text-gray-700 mb-2">
                                ملف MikroTik
                            </label>
                            <input 
                                type="text" 
                                id="mikrotikProfile" 
                                name="mikrotikProfile"
                                placeholder="profile-100mbps"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>

                    <div class="pt-6 border-t border-gray-200">
                        <label class="flex items-center">
                            <input 
                                type="checkbox" 
                                id="isActive" 
                                name="isActive"
                                checked
                                class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                            <span class="ml-2 text-sm text-gray-700">الباقة نشطة ومتاحة للاشتراك</span>
                        </label>
                    </div>

                    <div class="flex items-center justify-end space-x-4 pt-6 border-t border-gray-200">
                        <a href="plans.html" class="px-6 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition-colors">
                            إلغاء
                        </a>
                        <button 
                            type="submit" 
                            class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                            حفظ الباقة
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/pages/admin/plan-form.js"></script>
</body>
</html>
