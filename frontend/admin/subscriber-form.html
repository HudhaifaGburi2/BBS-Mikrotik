<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نموذج المشترك - نظام فواتير الإنترنت</title>
    <link rel="stylesheet" href="/css/tailwind.css">
</head>
<body class="bg-gray-100">
    <div class="min-h-screen py-8 px-4">
        <div class="max-w-3xl mx-auto">
            <div class="bg-white rounded-lg shadow-md p-8">
                <div class="flex items-center justify-between mb-6">
                    <h2 id="form-title" class="text-2xl font-bold text-gray-900">Add Subscriber</h2>
                    <a href="subscribers.html" class="text-gray-600 hover:text-gray-900">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </a>
                </div>

                <form id="subscriber-form" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="fullName" class="block text-sm font-medium text-gray-700 mb-2">
                                Full Name <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="text" 
                                id="fullName" 
                                name="fullName" 
                                required
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <p class="error-message text-red-500 text-sm mt-1 hidden"></p>
                        </div>

                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                                Email <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                required
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <p class="error-message text-red-500 text-sm mt-1 hidden"></p>
                        </div>

                        <div>
                            <label for="phoneNumber" class="block text-sm font-medium text-gray-700 mb-2">
                                Phone Number <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="tel" 
                                id="phoneNumber" 
                                name="phoneNumber" 
                                required
                                placeholder="+966 5XXXXXXXX"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <p class="error-message text-red-500 text-sm mt-1 hidden"></p>
                        </div>

                        <div>
                            <label for="nationalId" class="block text-sm font-medium text-gray-700 mb-2">
                                National ID
                            </label>
                            <input 
                                type="text" 
                                id="nationalId" 
                                name="nationalId"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>

                    <div>
                        <label for="address" class="block text-sm font-medium text-gray-700 mb-2">
                            Address <span class="text-red-500">*</span>
                        </label>
                        <textarea 
                            id="address" 
                            name="address" 
                            required
                            rows="3"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
                        <p class="error-message text-red-500 text-sm mt-1 hidden"></p>
                    </div>

                    <div class="pt-6 border-t border-gray-200">
                        <h3 class="text-lg font-semibold text-gray-900 mb-4">Subscription Details</h3>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label for="planId" class="block text-sm font-medium text-gray-700 mb-2">
                                    Plan <span class="text-red-500">*</span>
                                </label>
                                <select 
                                    id="planId" 
                                    name="planId" 
                                    required
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                    <option value="">Select a plan...</option>
                                </select>
                                <p class="error-message text-red-500 text-sm mt-1 hidden"></p>
                            </div>

                            <div>
                                <label for="startDate" class="block text-sm font-medium text-gray-700 mb-2">
                                    Start Date <span class="text-red-500">*</span>
                                </label>
                                <input 
                                    type="date" 
                                    id="startDate" 
                                    name="startDate" 
                                    required
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            </div>
                        </div>

                        <div class="mt-4">
                            <label class="flex items-center">
                                <input 
                                    type="checkbox" 
                                    id="autoRenew" 
                                    name="autoRenew"
                                    class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                                <span class="ml-2 text-sm text-gray-700">Enable auto-renew</span>
                            </label>
                        </div>
                    </div>

                    <div class="flex items-center justify-end space-x-4 pt-6 border-t border-gray-200">
                        <a href="subscribers.html" class="px-6 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition-colors">
                            Cancel
                        </a>
                        <button 
                            type="submit" 
                            class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                            Save Subscriber
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    <script>
        if (!auth.requireAuth()) {
            throw new Error('Authentication required');
        }

        const mode = utils.getQueryParam('mode') || 'create';
        const subscriberId = utils.getQueryParam('id');

        document.getElementById('form-title').textContent = mode === 'edit' ? 'Edit Subscriber' : 'Add Subscriber';

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('startDate').value = today;

        async function loadPlans() {
            try {
                const response = await api.get('/plans');
                const plans = response.data || [];
                
                const planSelect = document.getElementById('planId');
                planSelect.innerHTML = '<option value="">Select a plan...</option>';
                
                plans.forEach(plan => {
                    const option = document.createElement('option');
                    option.value = plan.id;
                    option.textContent = `${plan.name} - ${utils.formatCurrency(plan.price)} (${plan.speedMbps} Mbps)`;
                    planSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading plans:', error);
                utils.showToast('Failed to load plans', 'error');
            }
        }

        async function loadSubscriber() {
            if (mode !== 'edit' || !subscriberId) return;

            try {
                utils.showLoading();
                const response = await api.get(`/subscribers/${subscriberId}`);
                
                if (response && response.data) {
                    const subscriber = response.data;
                    document.getElementById('fullName').value = subscriber.fullName || '';
                    document.getElementById('email').value = subscriber.email || '';
                    document.getElementById('phoneNumber').value = subscriber.phoneNumber || '';
                    document.getElementById('nationalId').value = subscriber.nationalId || '';
                    document.getElementById('address').value = subscriber.address || '';
                }
            } catch (error) {
                console.error('Error loading subscriber:', error);
                utils.showToast('Failed to load subscriber data', 'error');
            } finally {
                utils.hideLoading();
            }
        }

        function validateForm() {
            const errors = [];
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const address = document.getElementById('address').value.trim();
            const planId = document.getElementById('planId').value;

            if (!fullName) {
                errors.push({ field: 'fullName', message: 'Full name is required' });
            }

            if (!email) {
                errors.push({ field: 'email', message: 'Email is required' });
            } else if (!utils.validateEmail(email)) {
                errors.push({ field: 'email', message: 'Invalid email format' });
            }

            if (!phoneNumber) {
                errors.push({ field: 'phoneNumber', message: 'Phone number is required' });
            } else if (!utils.validatePhone(phoneNumber)) {
                errors.push({ field: 'phoneNumber', message: 'Invalid phone number format (use +966 5XXXXXXXX)' });
            }

            if (!address) {
                errors.push({ field: 'address', message: 'Address is required' });
            }

            if (!planId) {
                errors.push({ field: 'planId', message: 'Please select a plan' });
            }

            document.querySelectorAll('.error-message').forEach(el => {
                el.classList.add('hidden');
                el.textContent = '';
            });

            errors.forEach(error => {
                const field = document.getElementById(error.field);
                if (field) {
                    const errorEl = field.parentElement.querySelector('.error-message');
                    if (errorEl) {
                        errorEl.textContent = error.message;
                        errorEl.classList.remove('hidden');
                    }
                    field.classList.add('border-red-500');
                }
            });

            return errors.length === 0;
        }

        document.getElementById('subscriber-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!validateForm()) {
                utils.showToast('Please fix the errors in the form', 'error');
                return;
            }

            const formData = {
                fullName: document.getElementById('fullName').value.trim(),
                email: document.getElementById('email').value.trim(),
                phoneNumber: document.getElementById('phoneNumber').value.trim(),
                nationalId: document.getElementById('nationalId').value.trim() || null,
                address: document.getElementById('address').value.trim(),
                planId: document.getElementById('planId').value,
                startDate: document.getElementById('startDate').value,
                autoRenew: document.getElementById('autoRenew').checked
            };

            try {
                utils.showLoading();

                let response;
                if (mode === 'edit' && subscriberId) {
                    response = await api.put(`/subscribers/${subscriberId}`, formData);
                    utils.showToast('Subscriber updated successfully', 'success');
                } else {
                    response = await api.post('/subscribers', formData);
                    utils.showToast('Subscriber created successfully', 'success');
                }

                setTimeout(() => {
                    window.location.href = 'subscribers.html';
                }, 1500);
            } catch (error) {
                console.error('Error saving subscriber:', error);
                utils.showToast(error.message || 'Failed to save subscriber', 'error');
            } finally {
                utils.hideLoading();
            }
        });

        document.querySelectorAll('input, select, textarea').forEach(field => {
            field.addEventListener('input', () => {
                field.classList.remove('border-red-500');
                const errorEl = field.parentElement.querySelector('.error-message');
                if (errorEl) {
                    errorEl.classList.add('hidden');
                }
            });
        });

        loadPlans();
        loadSubscriber();
    </script>
</body>
</html>
