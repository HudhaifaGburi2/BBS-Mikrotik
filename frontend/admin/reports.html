<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التقارير - نظام فواتير الإنترنت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-gradient-to-b from-blue-900 to-blue-800 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
            <div class="flex items-center justify-between h-16 px-6 bg-blue-950">
                <h1 class="text-xl font-bold text-white">إدارة النظام</h1>
                <button id="close-sidebar" class="lg:hidden text-white hover:text-gray-300">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <nav class="mt-6 px-3">
                <a href="dashboard.html" class="flex items-center px-4 py-3 mb-2 text-blue-100 hover:bg-blue-700 rounded-lg transition-colors">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    Dashboard
                </a>
                
                <a href="subscribers.html" class="flex items-center px-4 py-3 mb-2 text-blue-100 hover:bg-blue-700 rounded-lg transition-colors">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                    Subscribers
                </a>
                
                <a href="plans.html" class="flex items-center px-4 py-3 mb-2 text-blue-100 hover:bg-blue-700 rounded-lg transition-colors">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                    </svg>
                    Plans
                </a>
                
                <a href="invoices.html" class="flex items-center px-4 py-3 mb-2 text-blue-100 hover:bg-blue-700 rounded-lg transition-colors">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    Invoices
                </a>
                
                <a href="payments.html" class="flex items-center px-4 py-3 mb-2 text-blue-100 hover:bg-blue-700 rounded-lg transition-colors">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path>
                    </svg>
                    Payments
                </a>
                
                <a href="reports.html" class="flex items-center px-4 py-3 mb-2 text-white bg-blue-700 rounded-lg">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                    Reports
                </a>
                
                <a href="online-users.html" class="flex items-center px-4 py-3 mb-2 text-blue-100 hover:bg-blue-700 rounded-lg transition-colors">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.636 18.364a9 9 0 010-12.728m12.728 0a9 9 0 010 12.728m-9.9-2.829a5 5 0 010-7.07m7.072 0a5 5 0 010 7.07M13 12a1 1 0 11-2 0 1 1 0 012 0z"></path>
                    </svg>
                    Online Users
                </a>
            </nav>
        </aside>

        <div class="flex-1 lg:ml-64">
            <header class="bg-white shadow-sm">
                <div class="flex items-center justify-between px-6 py-4">
                    <div class="flex items-center">
                        <button id="menu-toggle" class="lg:hidden mr-4 text-gray-600 hover:text-gray-900">
                            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                            </svg>
                        </button>
                        <h2 class="text-2xl font-semibold text-gray-800">Reports & Analytics</h2>
                    </div>
                    
                    <div class="flex items-center space-x-4">
                        <div class="hidden md:flex items-center text-gray-700">
                            <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                            <span id="user-name" class="font-medium">Admin User</span>
                        </div>
                        <button onclick="auth.logout()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">
                            Logout
                        </button>
                    </div>
                </div>
            </header>

            <main class="p-6">
                <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">إنشاء تقرير</h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label for="report-type" class="block text-sm font-medium text-gray-700 mb-2">Report Type</label>
                            <select id="report-type" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                <option value="revenue">تقرير الإيرادات</option>
                                <option value="usage">Usage Report</option>
                                <option value="overdue">Overdue Payments</option>
                                <option value="newsubscribers">New Subscribers</option>
                            </select>
                        </div>
                        
                        <div>
                            <label for="from-date" class="block text-sm font-medium text-gray-700 mb-2">From Date</label>
                            <input type="date" id="from-date" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        
                        <div>
                            <label for="to-date" class="block text-sm font-medium text-gray-700 mb-2">To Date</label>
                            <input type="date" id="to-date" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>

                    <div class="flex items-center space-x-4 mt-4">
                        <button onclick="generateReport()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                            Generate Report
                        </button>
                        <button onclick="exportToExcel()" class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors">
                            Export to Excel
                        </button>
                    </div>
                </div>

                <div id="chart-section" class="bg-white rounded-lg shadow-md p-6 mb-6 hidden">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">Visual Report</h3>
                    <div class="relative h-96">
                        <canvas id="report-chart"></canvas>
                    </div>
                </div>

                <div id="table-section" class="bg-white rounded-lg shadow-md p-6 hidden">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">Report Details</h3>
                    <div id="report-table"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    <script>
        if (!auth.requireAuth()) {
            throw new Error('Authentication required');
        }

        const user = auth.getUser();
        if (user && user.fullName) {
            document.getElementById('user-name').textContent = user.fullName;
        }

        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const closeSidebar = document.getElementById('close-sidebar');

        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('-translate-x-full');
        });

        closeSidebar.addEventListener('click', () => {
            sidebar.classList.add('-translate-x-full');
        });

        const today = new Date().toISOString().split('T')[0];
        const firstDay = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
        document.getElementById('from-date').value = firstDay;
        document.getElementById('to-date').value = today;

        let reportChart = null;
        let reportData = [];

        async function generateReport() {
            try {
                utils.showLoading();
                
                const reportType = document.getElementById('report-type').value;
                const fromDate = document.getElementById('from-date').value;
                const toDate = document.getElementById('to-date').value;

                const queryParams = new URLSearchParams({
                    from: fromDate,
                    to: toDate
                });

                const response = await api.get(`/reports/${reportType}?${queryParams.toString()}`);
                
                if (response && response.data) {
                    reportData = response.data;
                    renderChart(reportType, reportData);
                    renderTable(reportType, reportData);
                    
                    document.getElementById('chart-section').classList.remove('hidden');
                    document.getElementById('table-section').classList.remove('hidden');
                    
                    utils.showToast('Report generated successfully', 'success');
                }
            } catch (error) {
                console.error('Error generating report:', error);
                utils.showToast('Failed to generate report', 'error');
            } finally {
                utils.hideLoading();
            }
        }

        function renderChart(reportType, data) {
            const ctx = document.getElementById('report-chart').getContext('2d');
            
            if (reportChart) {
                reportChart.destroy();
            }

            let chartConfig = {};

            if (reportType === 'revenue') {
                chartConfig = {
                    type: 'bar',
                    data: {
                        labels: data.map(item => item.period || item.month || item.date),
                        datasets: [{
                            label: 'Revenue (SAR)',
                            data: data.map(item => item.revenue || item.amount || 0),
                            backgroundColor: 'rgba(59, 130, 246, 0.5)',
                            borderColor: 'rgba(59, 130, 246, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                };
            } else if (reportType === 'usage') {
                chartConfig = {
                    type: 'line',
                    data: {
                        labels: data.map(item => item.date || item.period),
                        datasets: [{
                            label: 'Data Usage (GB)',
                            data: data.map(item => item.usage || item.dataGB || 0),
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            borderColor: 'rgba(16, 185, 129, 1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                };
            } else {
                chartConfig = {
                    type: 'bar',
                    data: {
                        labels: data.map(item => item.label || item.name || item.subscriber),
                        datasets: [{
                            label: 'Count',
                            data: data.map(item => item.count || item.value || 1),
                            backgroundColor: 'rgba(249, 115, 22, 0.5)',
                            borderColor: 'rgba(249, 115, 22, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                };
            }

            reportChart = new Chart(ctx, chartConfig);
        }

        function renderTable(reportType, data) {
            let columns = [];

            if (reportType === 'revenue') {
                columns = [
                    { label: 'Period', field: 'period' },
                    { label: 'Revenue', field: 'revenue', type: 'currency' },
                    { label: 'Invoices', field: 'invoiceCount' },
                    { label: 'Subscribers', field: 'subscriberCount' }
                ];
            } else if (reportType === 'usage') {
                columns = [
                    { label: 'Date', field: 'date', type: 'date' },
                    { label: 'Data Usage (GB)', field: 'usage', render: (row) => `${row.usage || 0} GB` },
                    { label: 'Active Users', field: 'activeUsers' }
                ];
            } else if (reportType === 'overdue') {
                columns = [
                    { label: 'Subscriber', field: 'subscriberName' },
                    { label: 'Invoice #', field: 'invoiceNumber' },
                    { label: 'Amount', field: 'amount', type: 'currency' },
                    { label: 'Due Date', field: 'dueDate', type: 'date' },
                    { label: 'Days Overdue', field: 'daysOverdue' }
                ];
            } else if (reportType === 'newsubscribers') {
                columns = [
                    { label: 'Name', field: 'fullName' },
                    { label: 'Email', field: 'email' },
                    { label: 'Plan', field: 'planName' },
                    { label: 'Join Date', field: 'createdAt', type: 'date' }
                ];
            }

            components.renderTable(data, columns, 'report-table');
        }

        function exportToExcel() {
            if (reportData.length === 0) {
                utils.showToast('No data to export', 'warning');
                return;
            }

            const reportType = document.getElementById('report-type').value;
            let headers = [];
            let rows = [];

            if (reportType === 'revenue') {
                headers = ['Period', 'Revenue', 'Invoices', 'Subscribers'];
                rows = reportData.map(item => [
                    item.period || '',
                    item.revenue || 0,
                    item.invoiceCount || 0,
                    item.subscriberCount || 0
                ]);
            } else if (reportType === 'usage') {
                headers = ['Date', 'Usage (GB)', 'Active Users'];
                rows = reportData.map(item => [
                    utils.formatDate(item.date),
                    item.usage || 0,
                    item.activeUsers || 0
                ]);
            } else if (reportType === 'overdue') {
                headers = ['Subscriber', 'Invoice #', 'Amount', 'Due Date', 'Days Overdue'];
                rows = reportData.map(item => [
                    item.subscriberName || '',
                    item.invoiceNumber || '',
                    item.amount || 0,
                    utils.formatDate(item.dueDate),
                    item.daysOverdue || 0
                ]);
            } else if (reportType === 'newsubscribers') {
                headers = ['Name', 'Email', 'Plan', 'Join Date'];
                rows = reportData.map(item => [
                    item.fullName || '',
                    item.email || '',
                    item.planName || '',
                    utils.formatDate(item.createdAt)
                ]);
            }

            let csvContent = headers.join(',') + '\n';
            rows.forEach(row => {
                csvContent += row.map(cell => `"${cell}"`).join(',') + '\n';
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            
            link.setAttribute('href', url);
            link.setAttribute('download', `report_${reportType}_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            utils.showToast('Report exported successfully', 'success');
        }
    </script>
</body>
</html>
