<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفواتير - نظام فواتير الإنترنت</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-gradient-to-b from-blue-900 to-blue-800 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out no-print">
            <div class="flex items-center justify-between h-16 px-6 bg-blue-950">
                <h1 class="text-xl font-bold text-white">إدارة النظام</h1>
                <button id="close-sidebar" class="lg:hidden text-white hover:text-gray-300">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <nav class="mt-6 px-3">
                <a href="dashboard.html" class="flex items-center px-4 py-3 mb-2 text-blue-100 hover:bg-blue-700 rounded-lg transition-colors">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    Dashboard
                </a>
                
                <a href="subscribers.html" class="flex items-center px-4 py-3 mb-2 text-blue-100 hover:bg-blue-700 rounded-lg transition-colors">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                    Subscribers
                </a>
                
                <a href="plans.html" class="flex items-center px-4 py-3 mb-2 text-blue-100 hover:bg-blue-700 rounded-lg transition-colors">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                    </svg>
                    Plans
                </a>
                
                <a href="invoices.html" class="flex items-center px-4 py-3 mb-2 text-white bg-blue-700 rounded-lg">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    Invoices
                </a>
                
                <a href="payments.html" class="flex items-center px-4 py-3 mb-2 text-blue-100 hover:bg-blue-700 rounded-lg transition-colors">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path>
                    </svg>
                    Payments
                </a>
                
                <a href="reports.html" class="flex items-center px-4 py-3 mb-2 text-blue-100 hover:bg-blue-700 rounded-lg transition-colors">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                    Reports
                </a>
                
                <a href="online-users.html" class="flex items-center px-4 py-3 mb-2 text-blue-100 hover:bg-blue-700 rounded-lg transition-colors">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.636 18.364a9 9 0 010-12.728m12.728 0a9 9 0 010 12.728m-9.9-2.829a5 5 0 010-7.07m7.072 0a5 5 0 010 7.07M13 12a1 1 0 11-2 0 1 1 0 012 0z"></path>
                    </svg>
                    Online Users
                </a>
            </nav>
        </aside>

        <div class="flex-1 lg:ml-64">
            <header class="bg-white shadow-sm no-print">
                <div class="flex items-center justify-between px-6 py-4">
                    <div class="flex items-center">
                        <button id="menu-toggle" class="lg:hidden mr-4 text-gray-600 hover:text-gray-900">
                            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                            </svg>
                        </button>
                        <h2 class="text-2xl font-semibold text-gray-800">الفواتير</h2>
                    </div>
                    
                    <div class="flex items-center space-x-4">
                        <div class="hidden md:flex items-center text-gray-700">
                            <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                            <span id="user-name" class="font-medium">Admin User</span>
                        </div>
                        <button onclick="auth.logout()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">
                            Logout
                        </button>
                    </div>
                </div>
            </header>

            <main class="p-6">
                <div class="bg-white rounded-lg shadow-md p-6 mb-6 no-print">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label for="status-filter" class="block text-sm font-medium text-gray-700 mb-2">الحالة</label>
                            <select id="status-filter" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                <option value="">جميع الحالات</option>
                                <option value="Pending">Pending</option>
                                <option value="Paid">مدفوع</option>
                                <option value="Overdue">متأخر</option>
                                <option value="Cancelled">Cancelled</option>
                            </select>
                        </div>
                        
                        <div>
                            <label for="from-date" class="block text-sm font-medium text-gray-700 mb-2">From Date</label>
                            <input type="date" id="from-date" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        
                        <div>
                            <label for="to-date" class="block text-sm font-medium text-gray-700 mb-2">To Date</label>
                            <input type="date" id="to-date" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>

                    <div class="flex items-center space-x-4 mt-4">
                        <button onclick="loadInvoices()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                            Apply Filters
                        </button>
                        <button onclick="exportToCSV()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors">
                            Export to CSV
                        </button>
                        <button onclick="window.print()" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition-colors">
                            Print
                        </button>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow-md p-6">
                    <div id="invoices-table"></div>
                    <div id="pagination-container" class="mt-4"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    <script>
        if (!auth.requireAuth()) {
            throw new Error('Authentication required');
        }

        const user = auth.getUser();
        if (user && user.fullName) {
            document.getElementById('user-name').textContent = user.fullName;
        }

        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const closeSidebar = document.getElementById('close-sidebar');

        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('-translate-x-full');
        });

        closeSidebar.addEventListener('click', () => {
            sidebar.classList.add('-translate-x-full');
        });

        let currentPage = 1;
        const pageSize = 20;
        let invoicesData = [];

        async function loadInvoices() {
            try {
                utils.showLoading();
                
                const statusFilter = document.getElementById('status-filter').value;
                const fromDate = document.getElementById('from-date').value;
                const toDate = document.getElementById('to-date').value;

                const queryParams = new URLSearchParams({
                    pageNumber: currentPage,
                    pageSize: pageSize
                });

                if (statusFilter) queryParams.append('status', statusFilter);
                if (fromDate) queryParams.append('fromDate', fromDate);
                if (toDate) queryParams.append('toDate', toDate);

                const response = await api.get(`/invoices?${queryParams.toString()}`);
                
                if (response && response.data) {
                    invoicesData = response.data.items || response.data;
                    const totalPages = response.data.totalPages || 1;
                    
                    const columns = [
                        { label: 'Invoice #', field: 'invoiceNumber' },
                        { label: 'Subscriber', field: 'subscriberName' },
                        { 
                            label: 'Amount', 
                            field: 'amount',
                            type: 'currency'
                        },
                        { 
                            label: 'Tax', 
                            field: 'taxAmount',
                            type: 'currency'
                        },
                        { 
                            label: 'Total', 
                            field: 'totalAmount',
                            type: 'currency'
                        },
                        { 
                            label: 'Issue Date', 
                            field: 'issueDate',
                            type: 'date'
                        },
                        { 
                            label: 'Due Date', 
                            field: 'dueDate',
                            type: 'date'
                        },
                        { 
                            label: 'Status', 
                            field: 'status',
                            render: (row) => {
                                const statusColors = {
                                    'Paid': 'bg-green-100 text-green-800',
                                    'Pending': 'bg-yellow-100 text-yellow-800',
                                    'Overdue': 'bg-red-100 text-red-800',
                                    'Cancelled': 'bg-gray-100 text-gray-800'
                                };
                                const colorClass = statusColors[row.status] || 'bg-gray-100 text-gray-800';
                                return `<span class="px-2 py-1 text-xs font-semibold rounded-full ${colorClass}">${row.status}</span>`;
                            }
                        },
                        { 
                            label: 'Actions', 
                            field: 'id',
                            render: (row) => `
                                <div class="flex space-x-2 no-print">
                                    <a href="invoice-detail.html?id=${row.id}" class="text-blue-600 hover:text-blue-800">
                                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                        </svg>
                                    </a>
                                </div>
                            `
                        }
                    ];
                    
                    components.renderTable(invoicesData, columns, 'invoices-table');
                    components.renderPagination(currentPage, totalPages, 'goToPage');
                }
            } catch (error) {
                console.error('Error loading invoices:', error);
                utils.showToast('Failed to load invoices', 'error');
            } finally {
                utils.hideLoading();
            }
        }

        window.goToPage = function(page) {
            currentPage = page;
            loadInvoices();
        };

        function exportToCSV() {
            if (invoicesData.length === 0) {
                utils.showToast('No data to export', 'warning');
                return;
            }

            const headers = ['Invoice #', 'Subscriber', 'Amount', 'Tax', 'Total', 'Issue Date', 'Due Date', 'Status'];
            const rows = invoicesData.map(invoice => [
                invoice.invoiceNumber || '',
                invoice.subscriberName || '',
                invoice.amount || 0,
                invoice.taxAmount || 0,
                invoice.totalAmount || 0,
                utils.formatDate(invoice.issueDate),
                utils.formatDate(invoice.dueDate),
                invoice.status || ''
            ]);

            let csvContent = headers.join(',') + '\n';
            rows.forEach(row => {
                csvContent += row.map(cell => `"${cell}"`).join(',') + '\n';
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            
            link.setAttribute('href', url);
            link.setAttribute('download', `invoices_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            utils.showToast('CSV exported successfully', 'success');
        }

        const today = new Date().toISOString().split('T')[0];
        const firstDay = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
        document.getElementById('from-date').value = firstDay;
        document.getElementById('to-date').value = today;

        loadInvoices();
    </script>
    
    <style>
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                background: white;
            }
        }
    </style>
</body>
</html>
