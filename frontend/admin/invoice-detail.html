<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Detail - نظام فواتير الإنترنت</title>
    <link rel="stylesheet" href="/css/tailwind.css">
</head>
<body class="bg-gray-100">
    <div class="min-h-screen py-8 px-4">
        <div class="max-w-4xl mx-auto">
            <div class="bg-white rounded-lg shadow-md p-8">
                <div class="flex items-center justify-between mb-6 no-print">
                    <h2 class="text-2xl font-bold text-gray-900">Invoice Details</h2>
                    <div class="flex items-center space-x-2">
                        <button onclick="downloadPDF()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                            Download PDF
                        </button>
                        <button onclick="window.print()" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition-colors">
                            Print
                        </button>
                        <a href="invoices.html" class="text-gray-600 hover:text-gray-900">
                            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </a>
                    </div>
                </div>

                <div id="invoice-content">
                    <div class="border-b border-gray-200 pb-6 mb-6">
                        <div class="flex justify-between items-start">
                            <div>
                                <h1 class="text-3xl font-bold text-blue-600">INVOICE</h1>
                                <p id="invoice-number" class="text-gray-600 mt-2">Invoice #: -</p>
                            </div>
                            <div class="text-right">
                                <h2 class="text-xl font-bold text-gray-900">نظام فواتير الإنترنت</h2>
                                <p class="text-gray-600 text-sm mt-2">123 Main Street</p>
                                <p class="text-gray-600 text-sm">Riyadh, Saudi Arabia</p>
                                <p class="text-gray-600 text-sm">Phone: +966 XX XXX XXXX</p>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div>
                            <h3 class="text-sm font-semibold text-gray-700 uppercase mb-2">Bill To:</h3>
                            <div id="subscriber-info" class="text-gray-900">
                                <p class="font-medium" id="subscriber-name">-</p>
                                <p class="text-sm" id="subscriber-email">-</p>
                                <p class="text-sm" id="subscriber-phone">-</p>
                                <p class="text-sm" id="subscriber-address">-</p>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-sm font-semibold text-gray-700 uppercase mb-2">Invoice Details:</h3>
                            <div class="text-gray-900 text-sm space-y-1">
                                <p><span class="font-medium">Issue Date:</span> <span id="issue-date">-</span></p>
                                <p><span class="font-medium">Due Date:</span> <span id="due-date">-</span></p>
                                <p><span class="font-medium">Status:</span> <span id="invoice-status">-</span></p>
                            </div>
                        </div>
                    </div>

                    <div class="mb-6">
                        <h3 class="text-sm font-semibold text-gray-700 uppercase mb-4">Line Items:</h3>
                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">الوصف</th>
                                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">المبلغ</th>
                                    </tr>
                                </thead>
                                <tbody id="line-items" class="bg-white divide-y divide-gray-200">
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="border-t border-gray-200 pt-6">
                        <div class="flex justify-end">
                            <div class="w-64">
                                <div class="flex justify-between mb-2">
                                    <span class="text-gray-700">Subtotal:</span>
                                    <span id="subtotal" class="font-medium">-</span>
                                </div>
                                <div class="flex justify-between mb-2">
                                    <span class="text-gray-700">Tax (15%):</span>
                                    <span id="tax" class="font-medium">-</span>
                                </div>
                                <div class="flex justify-between border-t border-gray-200 pt-2">
                                    <span class="text-lg font-bold text-gray-900">Total:</span>
                                    <span id="total" class="text-lg font-bold text-gray-900">-</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="payment-status" class="mt-8 hidden">
                        <div class="bg-green-50 border border-green-200 rounded-lg p-4">
                            <div class="flex items-center">
                                <svg class="h-6 w-6 text-green-600 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                                <div>
                                    <p class="font-medium text-green-900">Payment Received</p>
                                    <p class="text-sm text-green-700" id="payment-date">-</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="mark-paid-section" class="mt-8 no-print hidden">
                        <button onclick="markAsPaid()" class="w-full px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-medium">
                            Mark as Paid
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    <script>
        if (!auth.requireAuth()) {
            throw new Error('Authentication required');
        }

        const invoiceId = utils.getQueryParam('id');

        if (!invoiceId) {
            utils.showToast('Invoice ID is required', 'error');
            setTimeout(() => {
                window.location.href = 'invoices.html';
            }, 2000);
        }

        async function loadInvoice() {
            try {
                utils.showLoading();
                
                const response = await api.get(`/invoices/${invoiceId}`);
                
                if (response && response.data) {
                    const invoice = response.data;
                    
                    document.getElementById('invoice-number').textContent = `Invoice #: ${invoice.invoiceNumber || '-'}`;
                    document.getElementById('subscriber-name').textContent = invoice.subscriberName || '-';
                    document.getElementById('subscriber-email').textContent = invoice.subscriberEmail || '-';
                    document.getElementById('subscriber-phone').textContent = invoice.subscriberPhone || '-';
                    document.getElementById('subscriber-address').textContent = invoice.subscriberAddress || '-';
                    
                    document.getElementById('issue-date').textContent = utils.formatDate(invoice.issueDate);
                    document.getElementById('due-date').textContent = utils.formatDate(invoice.dueDate);
                    
                    const statusColors = {
                        'Paid': 'text-green-600 font-semibold',
                        'Pending': 'text-yellow-600 font-semibold',
                        'Overdue': 'text-red-600 font-semibold',
                        'Cancelled': 'text-gray-600 font-semibold'
                    };
                    const statusClass = statusColors[invoice.status] || 'text-gray-600';
                    document.getElementById('invoice-status').innerHTML = `<span class="${statusClass}">${invoice.status || '-'}</span>`;
                    
                    const lineItemsHtml = `
                        <tr>
                            <td class="px-6 py-4 text-sm text-gray-900">
                                ${invoice.description || 'Subscription Service'}
                            </td>
                            <td class="px-6 py-4 text-sm text-right text-gray-900">
                                ${utils.formatCurrency(invoice.amount || 0)}
                            </td>
                        </tr>
                    `;
                    document.getElementById('line-items').innerHTML = lineItemsHtml;
                    
                    document.getElementById('subtotal').textContent = utils.formatCurrency(invoice.amount || 0);
                    document.getElementById('tax').textContent = utils.formatCurrency(invoice.taxAmount || 0);
                    document.getElementById('total').textContent = utils.formatCurrency(invoice.totalAmount || 0);
                    
                    if (invoice.status === 'Paid') {
                        document.getElementById('payment-status').classList.remove('hidden');
                        document.getElementById('payment-date').textContent = `Paid on ${utils.formatDate(invoice.paidDate)}`;
                    } else {
                        document.getElementById('mark-paid-section').classList.remove('hidden');
                    }
                }
            } catch (error) {
                console.error('Error loading invoice:', error);
                utils.showToast('Failed to load invoice', 'error');
            } finally {
                utils.hideLoading();
            }
        }

        async function downloadPDF() {
            try {
                utils.showLoading();
                const response = await api.get(`/invoices/${invoiceId}/pdf`);
                
                if (response && response.data && response.data.pdfUrl) {
                    const link = document.createElement('a');
                    link.href = response.data.pdfUrl;
                    link.download = `invoice_${invoiceId}.pdf`;
                    link.click();
                    utils.showToast('PDF download started', 'success');
                } else {
                    window.print();
                    utils.showToast('Please use print dialog to save as PDF', 'info');
                }
            } catch (error) {
                console.error('Error downloading PDF:', error);
                window.print();
                utils.showToast('Please use print dialog to save as PDF', 'info');
            } finally {
                utils.hideLoading();
            }
        }

        async function markAsPaid() {
            if (!confirm('Are you sure you want to mark this invoice as paid?')) {
                return;
            }

            try {
                utils.showLoading();
                await api.put(`/invoices/${invoiceId}/pay`, {});
                utils.showToast('Invoice marked as paid', 'success');
                setTimeout(() => {
                    loadInvoice();
                }, 1500);
            } catch (error) {
                console.error('Error marking invoice as paid:', error);
                utils.showToast('Failed to mark invoice as paid', 'error');
            } finally {
                utils.hideLoading();
            }
        }

        loadInvoice();
    </script>
    
    <style>
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                background: white;
            }
        }
    </style>
</body>
</html>
